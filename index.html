<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 INV = 30,000 CRR | Sailor Piece ☠</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #2c2f33, #1e2124);
  color: white;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

.container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 2;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 40px;
  width: 90%;
  max-width: 700px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: fadeIn 0.8s ease;
}

h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
  font-weight: 800;
}

p {
  font-size: 1.2em;
  opacity: 0.85;
}

button {
  margin-top: 25px;
  padding: 14px 28px;
  font-size: 1em;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(135deg,#5865F2,#4752c4);
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(88,101,242,0.5);
}

.stats {
  margin-top: 15px;
  font-size: 0.9em;
  opacity: 0.7;
}

.fade-out {
  animation: fadeOut 0.5s forwards;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);} 
  to {opacity:1; transform: translateY(0);} 
}

@keyframes fadeOut {
  from {opacity:1;} 
  to {opacity:0;} 
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
  <div class="card" id="card">
    <h1 id="title">Welcome</h1>
    <p id="desc">Loading...</p>
    <div class="stats" id="stats"></div>
    <button onclick="nextPage()" id="btn">Next</button>
  </div>
</div>

<!-- BACKSOUND (GitHub-safe CDN) -->
<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f1a3c4b1.mp3" type="audio/mpeg">
</audio>

<script>

// ===== PARTICLES (GitHub Pages safe) =====
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let particles = [];
for (let i = 0; i < 70; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5) * 0.4,
    speedY: (Math.random() - 0.5) * 0.4
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();
  });

  requestAnimationFrame(animateParticles);
}
animateParticles();

// ===== PAGES =====
const pages = [
  {title:"Welcome to Sailor Piece ☠",desc:"An active, fun Discord server with a friendly community!",btn:"Next"},
  {title:"🎁 Tons of Giveaways",desc:"Win Robux, rewards, and exclusive prizes every week.",btn:"Next"},
  {title:"🔥 Free Stuff",desc:"Claim free rewards easily just by being active.",btn:"Next"},
  {title:"💬 Always Active",desc:"Thousands of members, always chatting and having fun.",btn:"Next"},
  {title:"Join Now",desc:"Click below and become part of the community 🚀",btn:"Join Discord",final:true}
];

let index = 0;

function updatePage() {
  const card = document.getElementById('card');
  card.classList.add('fade-out');

  setTimeout(() => {
    const page = pages[index];
    document.getElementById('title').innerText = page.title;
    document.getElementById('desc').innerText = page.desc;
    document.getElementById('btn').innerText = page.btn;
    card.classList.remove('fade-out');
  }, 300);
}

function nextPage() {
  if (pages[index].final) {
    window.open('https://discord.gg/F3aP9TRQpF','_blank');
    return;
  }
  index++;
  updatePage();
}

// ===== DISCORD STATS FIX (GitHub Pages) =====
const SERVER_ID = "1374726798356512880";

async function fetchDiscord() {
  try {
    const res = await fetch(`https://discord.com/api/guilds/${SERVER_ID}/widget.json`);
    const data = await res.json();

    // IMPORTANT FIX: widget.json doesn't return full member count
    document.getElementById('stats').innerText =
      `${data.presence_count} online • server active`;

  } catch {
    document.getElementById('stats').innerText = "Active community 🚀";
  }
}
fetchDiscord();

// ===== MUSIC (required click) =====
document.body.addEventListener('click', () => {
  const music = document.getElementById('bgm');
  music.volume = 0.4;
  music.play().catch(()=>{});
}, { once: true });

</script>

</body>
</html>
